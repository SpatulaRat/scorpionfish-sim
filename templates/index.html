<!DOCTYPE html>

<html>
<head>
  <title>Scorpionfish Evolution</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    canvas { border: 1px solid black; }
  </style>
</head>
<body>

<h2>Scorpionfish Evolution</h2>
<canvas id="tank" width="700" height="400"></canvas>
<button onclick="start()">Start</button>
<p id="stats"></p>
<canvas id="graph" width="700" height="300"></canvas>

<script>
const canvas = tank, ctx = canvas.getContext("2d");
let fish=[], predators=[], gen=0, frame=0, chart;

function createFish(t){
  return {
    x:Math.random()*700, y:Math.random()*400,
    vx:(Math.random()-0.5)*(t?1.4:2),
    vy:(Math.random()-0.5)*(t?1.4:2),
    toxic:t, alive:true
  };
}

function createPred(){
  return {x:Math.random()*700,y:Math.random()*400,speed:3,avoid:0.97};
}

function moveFish(f){
  f.x+=f.vx; f.y+=f.vy;
  if(f.x<0||f.x>700)f.vx*=-1;
  if(f.y<0||f.y>400)f.vy*=-1;
}

function movePred(p){
  let t=null,dmin=1e9;
  fish.forEach(f=>{
    if(!f.alive) return;
    if(f.toxic && Math.random()<p.avoid) return;
    let dx=f.x-p.x, dy=f.y-p.y, d=Math.hypot(dx,dy);
    if(d<dmin){dmin=d;t=f;}
  });
  if(t){
    let dx=t.x-p.x, dy=t.y-p.y, d=Math.hypot(dx,dy);
    p.x+=dx/d*p.speed; p.y+=dy/d*p.speed;
    if(d<10){
      t.alive=false;
      if(t.toxic) p.avoid=Math.min(0.99,p.avoid+0.01);
    }
  }
}

function draw(){
  ctx.clearRect(0,0,700,400);
  fish.forEach(f=>{
    if(!f.alive)return;
    ctx.fillStyle=f.toxic?"red":"blue";
    ctx.beginPath(); ctx.arc(f.x,f.y,5,0,6.28); ctx.fill();
  });
  predators.forEach(p=>{
    ctx.fillStyle="black";
    ctx.beginPath(); ctx.arc(p.x,p.y,10,0,6.28); ctx.fill();
  });
}

function reproduce(){
  let alive=fish.filter(f=>f.alive), next=[];
  alive.forEach(f=>{
    let babies = f.toxic ? 1 : (Math.random()<0.5?1:2);
    for(let i=0;i<babies;i++){
      next.push(createFish(Math.random()<0.002 ? !f.toxic : f.toxic));
    }
  });
  fish=next.slice(0,200);
}

function update(){
  let alive=fish.filter(f=>f.alive);
  let tox=alive.filter(f=>f.toxic).length/(alive.length||1);
  chart.data.labels.push(gen);
  chart.data.datasets[0].data.push(tox);
  chart.update();
  stats.innerText=`Gen:${gen} Pop:${alive.length} Toxic:${(tox*100).toFixed(1)}%`;
}

function loop(){
  frame++;
  fish.forEach(moveFish);
  predators.forEach(movePred);
  draw();
  if(frame%300===0){
    update(); reproduce(); gen++;
  }
  requestAnimationFrame(loop);
}

function start(){
  fish=[]; predators=[]; gen=0; frame=0;
  for(let i=0;i<50;i++) fish.push(createFish(Math.random()<0.1));
  for(let i=0;i<10;i++) predators.push(createPred());

  chart=new Chart(graph.getContext("2d"),{
    type:"line",
    data:{labels:[],datasets:[{data:[],borderColor:"red"}]},
    options:{scales:{y:{min:0,max:1}}}
  });

  loop();
}
</script>

</body>
</html>
