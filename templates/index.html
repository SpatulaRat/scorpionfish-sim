<!DOCTYPE html>
<html>
<head>
  <title>Scorpionfish Evolution</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>California Scorpionfish Evolution</h1>

<div id="key" style="margin-bottom:10px;">
  <span style="display:inline-block;width:15px;height:15px;background:red;border-radius:50%;margin-right:5px;"></span>
  <span>Toxic Fish</span>

  <span style="display:inline-block;width:15px;height:15px;background:blue;border-radius:50%;margin:0 5px 0 15px;"></span>
  <span>Non-Toxic Fish</span>

  <span style="display:inline-block;width:15px;height:15px;background:black;border-radius:50%;margin:0 5px 0 15px;"></span>
  <span>Predator</span>
</div>
  
<canvas id="tank" width="600" height="400" style="border:1px solid black;"></canvas>

<button onclick="runSimulation()">Start Simulation</button>
  
<h2>Stats</h2>
<p id="stats"></p>

<canvas id="graph" width="600" height="300"></canvas>

<script src="/static/script.js"></script>
</body>
</html>
